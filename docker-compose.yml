networks:
  dev:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: ayeda_postgres
    restart: always
    environment:
      POSTGRES_DB: ayeda_dev
      POSTGRES_USER: ayeda
      POSTGRES_PASSWORD: ayeda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayeda"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev

  redis:
    image: redis:7-alpine
    container_name: ayeda_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev

  migrate:
    build:
      context: ./apps/backend
      target: builder
    env_file:
      - ./apps/backend/.env
    environment:
      DB_HOST: postgres
      DOCKER_ENV: true
      NODE_ENV: production
    command: npm run migration:run
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

  backend:
    build:
      context: ./apps/backend
      target: production
    container_name: ayeda_backend
    restart: always
    env_file:
      - ./apps/backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_ENV: production
      UPLOAD_PATH: /app/uploads
      DOCKER_ENV: "true"
    ports:
      - "3001:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - dev

  frontend:
    build:
      context: ./apps/frontend
      target: production
    container_name: ayeda_frontend
    restart: always
    environment:
      NUXT_PUBLIC_API_BASE: ${API_BASE_URL:-http://localhost:3001}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ayeda_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ayeda.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dev

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  pgadmin_data:
