version: "3.8"

networks:
  dev:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: ayeda_postgres
    restart: always
    environment:
      POSTGRES_DB: ayeda_dev
      POSTGRES_USER: ayeda
      POSTGRES_PASSWORD: ayeda
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayeda"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev

  redis:
    image: redis:7-alpine
    container_name: ayeda_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev

  migrate:
    build:
      context: ./apps/backend
    command:
      [
        "node",
        "node_modules/typeorm/cli.js",
        "migration:run",
        "-d",
        "dist/data-source.js",
      ]
    env_file:
      - ./apps/backend/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

  backend:
    build:
      context: ./apps/backend
    container_name: ayeda_backend
    env_file:
      - ./apps/backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "3001:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - dev
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    command: pnpm run start:dev

  frontend:
    build:
      context: ./apps/frontend
    container_name: ayeda_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dev
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:3001
    command: pnpm run dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ayeda_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ayeda.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - dev
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
