<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АуЕда - Офлайн режим</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8f8f8;
      color: #172026;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    h1 {
      color: #166534;
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #667085;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #166534;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      background: #14532d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📱</div>
    <h1>Вы офлайн</h1>
    <p>Похоже, у вас нет подключения к интернету. Некоторые функции могут быть недоступны.</p>
    <button class="btn" onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
