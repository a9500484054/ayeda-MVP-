# ========== БЕЗОПАСНОСТЬ ==========
# Установка пароля (ОБЯЗАТЕЛЬНО замените на свой сильный пароль!)
requirepass 3Jd6WtYrurHaNGQ3TMmh

# Запретить опасные команды (опционально, но рекомендуется)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# ========== ПАМЯТЬ ==========
# Максимальный объем памяти (256MB - для начала достаточно)
maxmemory 256mb

# Политика вытеснения данных когда память закончилась
# allkeys-lru - удаляет наименее используемые ключи
maxmemory-policy allkeys-lru

# ========== ПЕРСИСТЕНТНОСТЬ (БЭКАПЫ) ==========
# Включить AOF (Append Only File) - более надежный, но медленнее
appendonly yes
appendfilename "appendonly.aof"

# Как часто синхронизировать AOF
# everysec - хороший баланс между производительностью и надежностью
appendfsync everysec

# RDB (снапшоты) - для быстрых бэкапов
# Сохранять если:
save 900 1      # 1 изменение за 15 минут
save 300 10     # 10 изменений за 5 минут
save 60 10000   # 10000 изменений за 1 минуту

# Имя RDB файла
dbfilename "dump.rdb"

# Директория для сохранения файлов
dir /data

# ========== ПРОИЗВОДИТЕЛЬНОСТЬ ==========
# Таймаут для простоя соединения (0 - без таймаута)
timeout 300

# Максимальное количество клиентов
maxclients 10000

# ========== ЛОГИРОВАНИЕ ==========
# Уровень логирования (notice - для продакшена)
loglevel notice

# Файл логов (лучше stdout для Docker)
logfile ""

# ========== СЕТЬ ==========
# Слушать на всех интерфейсах (для Docker)
bind 0.0.0.0

# Защищенный режим
protected-mode yes

# Порт
port 6379
